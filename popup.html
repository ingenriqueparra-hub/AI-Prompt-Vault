<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 720px; max-width: 720px; min-height: 100vh; background: #0a0a0a; color: #f0f0f0; font-family: 'Space Mono', monospace; overflow: hidden; }
    body.settings-open { width: 720px; max-width: 720px; overflow: auto; }
    .header { background: #111; border-bottom: 1px solid #252525; padding: 14px 18px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
    .header h1 { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 800; letter-spacing: 0.04em; color: #fff; }
    .header .sub { font-size: 8px; color: #777; letter-spacing: 0.12em; text-transform: uppercase; margin-top: 2px; }
    .header-right { display: flex; gap: 6px; }
    .tab-btn { background: #1b1b1b; border: 1px solid #303030; border-radius: 5px; color: #aaa; font-family: 'Space Mono', monospace; font-size: 9px; font-weight: 700; letter-spacing: 0.08em; padding: 6px 9px; cursor: pointer; text-transform: uppercase; }
    .tab-btn:hover, .tab-btn.active { background: #f0f0f0; color: #111; border-color: #f0f0f0; }
    .screen { display: none; }
    .screen.active { display: block; }
    .body { padding: 16px 18px; display: flex; flex-direction: column; gap: 12px; }
    .panel { background: #101010; border: 1px solid #252525; border-radius: 8px; padding: 12px; display: flex; flex-direction: column; gap: 10px; }
    .panel-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
    .label { font-size: 9px; color: #777; text-transform: uppercase; letter-spacing: 0.08em; }
    #modelName { font-size: 16px; font-weight: 700; margin-top: 2px; }
    #modelUrl { font-size: 9px; color: #555; word-break: break-all; line-height: 1.4; max-width: 230px; text-align: right; }
    .select-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .field { display: flex; flex-direction: column; gap: 5px; }
    .select, .input, .textarea { background: #171717; border: 1px solid #333; border-radius: 6px; color: #f0f0f0; font-family: 'Space Mono', monospace; font-size: 11px; padding: 9px 10px; outline: none; width: 100%; }
    .select:focus, .input:focus, .textarea:focus { border-color: #777; }
    .textarea { min-height: 168px; resize: vertical; line-height: 1.5; }
    .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .btn { width: 100%; min-height: 36px; padding: 9px; border: 1px solid #333; border-radius: 7px; font-family: 'Space Mono', monospace; font-size: 10px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; cursor: pointer; background: #1a1a1a; color: #ddd; }
    .btn:hover { border-color: #777; background: #222; }
    .btn:disabled { color: #444; border-color: #222; background: #111; cursor: not-allowed; }
    .btn-primary { background: #f0f0f0; color: #111; border-color: #f0f0f0; }
    .btn-primary:hover { background: #fff; }
    .btn-success { background: #173118; color: #4caf50; border-color: #295d2b; }
    .btn-danger { color: #f44336; }
    .img-grid, #pendingImgsGrid, #promptPreviewImgs { display: flex; flex-wrap: wrap; gap: 7px; min-height: 22px; }
    .img-thumb { position: relative; width: 58px; min-height: 72px; border: 1px solid #333; border-radius: 6px; overflow: hidden; background: #151515; }
    .img-thumb img { width: 58px; height: 48px; object-fit: cover; display: block; }
    .img-thumb span { display: block; padding: 3px 4px; color: #777; font-size: 7px; line-height: 1.2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .img-del { position: absolute; top: 2px; right: 2px; background: rgba(0,0,0,0.85); border: 1px solid #444; border-radius: 3px; color: #f44336; font-size: 9px; width: 18px; height: 18px; cursor: pointer; }
    .empty-note { color: #444; font-size: 9px; padding: 4px 0; }
    .memory-text { min-height: 76px; color: #aaa; }
    .memory-meta { font-size: 8px; color: #555; }
    #pendingImages { display: none; }
    .status { min-height: 18px; text-align: center; font-size: 9px; color: #555; }
    .status.ok { color: #4caf50; }
    .status.warn { color: #ff9800; }
    .status.err { color: #f44336; }
    .settings-body { padding: 18px; display: flex; flex-direction: column; gap: 18px; }
    .settings-tabs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .settings-tab-btn { background: #1b1b1b; border: 1px solid #303030; border-radius: 6px; color: #aaa; font-family: 'Space Mono', monospace; font-size: 10px; font-weight: 700; letter-spacing: 0.08em; padding: 9px; cursor: pointer; text-transform: uppercase; }
    .settings-tab-btn:hover, .settings-tab-btn.active { background: #f0f0f0; color: #111; border-color: #f0f0f0; }
    .prompt-model-tabs { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 12px; }
    .prompt-model-tab { background: #151515; border: 1px solid #303030; border-radius: 6px; color: #aaa; font-family: 'Space Mono', monospace; font-size: 10px; font-weight: 700; padding: 7px 10px; cursor: pointer; }
    .prompt-model-tab.active { color: #111; background: #f0f0f0; border-color: #f0f0f0; }
    .settings-panel { display: none; }
    .settings-panel.active { display: block; }
    .settings-section-title { font-size: 13px; color: #fff; font-weight: 700; letter-spacing: 0.04em; margin-bottom: 10px; padding-bottom: 9px; border-bottom: 1px solid #2a2a2a; text-transform: uppercase; }
    #modelsList, #promptsList { display: flex; flex-direction: column; gap: 12px; }
    .model-item { display: grid; grid-template-columns: 1fr 1.4fr 44px 64px 74px 36px; gap: 8px; align-items: center; background: #101010; border: 1px solid #2a2a2a; border-radius: 8px; padding: 10px; }
    .model-name-input, .model-url-input, .prompt-name-input, .prompt-model-input { background: #171717; border: 1px solid #333; border-radius: 5px; color: #f0f0f0; font-family: 'Space Mono', monospace; font-size: 11px; padding: 8px; min-width: 0; }
    .model-color-input { width: 38px; height: 30px; background: #171717; border: 1px solid #333; border-radius: 5px; padding: 2px; }
    .model-check { color: #777; font-size: 10px; display: flex; align-items: center; gap: 4px; }
    .prompt-group { display: flex; flex-direction: column; gap: 10px; }
    .prompt-group-title { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; }
    .prompt-editor-layout { display: grid; grid-template-columns: 180px 1fr; gap: 12px; align-items: start; }
    .prompt-tabs-vertical { display: flex; flex-direction: column; gap: 7px; }
    .prompt-tab-vertical { width: 100%; background: #151515; border: 1px solid #303030; border-radius: 6px; color: #aaa; font-family: 'Space Mono', monospace; font-size: 10px; font-weight: 700; line-height: 1.25; padding: 9px; cursor: pointer; text-align: left; }
    .prompt-tab-vertical.active { background: #f0f0f0; color: #111; border-color: #f0f0f0; }
    .prompt-item { background: #101010; border: 1px solid #2a2a2a; border-radius: 8px; padding: 12px; display: flex; flex-direction: column; gap: 10px; }
    .prompt-item-header { display: grid; grid-template-columns: 1fr 150px auto; gap: 8px; align-items: center; }
    .prompt-item-actions { display: flex; gap: 6px; }
    .prompt-text-input { background: #171717; border: 1px solid #333; border-radius: 6px; color: #f0f0f0; font-family: 'Space Mono', monospace; font-size: 11px; padding: 10px; resize: vertical; min-height: 82px; line-height: 1.5; }
    .prompt-imgs-row { display: flex; flex-wrap: wrap; gap: 7px; }
    .add-img-btn { display: inline-flex; width: fit-content; align-items: center; gap: 5px; background: transparent; border: 1px solid #333; border-radius: 5px; color: #aaa; font-family: 'Space Mono', monospace; font-size: 10px; padding: 6px 10px; cursor: pointer; }
    .add-img-btn input { display: none; }
    .icon-btn { background: transparent; border: 1px solid #333; border-radius: 5px; color: #aaa; font-size: 10px; padding: 7px 9px; cursor: pointer; font-family: 'Space Mono', monospace; white-space: nowrap; }
    .icon-btn:hover { border-color: #777; color: #fff; }
    .icon-btn.danger:hover { border-color: #f44336; color: #f44336; }
    .add-prompt-btn { background: transparent; border: 1px dashed #333; border-radius: 8px; color: #777; font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 700; padding: 11px; width: 100%; cursor: pointer; text-transform: uppercase; letter-spacing: 0.08em; margin-top: 10px; }
    .add-prompt-btn:hover { border-color: #aaa; color: #fff; }
    .toast { position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%); background: #173118; color: #4caf50; border: 1px solid #295d2b; border-radius: 6px; padding: 7px 14px; font-size: 9px; pointer-events: none; opacity: 0; transition: opacity 0.25s; white-space: nowrap; z-index: 999; }
    .toast.show { opacity: 1; }
    .toast.err { background: #321616; color: #f44336; border-color: #653030; }
    .footer { padding: 8px 18px; border-top: 1px solid #111; font-size: 8px; color: #333; text-align: center; letter-spacing: 0.1em; }
  </style>
</head>
<body>

<div class="header">
  <div>
    <h1>AI PROMPT VAULT</h1>
    <div class="sub">Prompts · modelos · imagenes · memoria</div>
  </div>
  <div class="header-right">
    <button class="tab-btn active" id="tabMain">Vault</button>
    <button class="tab-btn" id="tabSettings">Config</button>
  </div>
</div>

<div class="screen active" id="screenMain">
  <div class="body">
    <div class="panel">
      <div class="panel-head">
        <div>
          <div class="label">Modelo activo</div>
          <div id="modelName">Modelo</div>
        </div>
        <div id="modelUrl"></div>
      </div>
      <div class="select-row">
        <div class="field">
          <div class="label">Modelo</div>
          <select class="select" id="modelSelect"></select>
        </div>
        <div class="field">
          <div class="label">Prompt</div>
          <select class="select" id="promptSelect"></select>
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="label">Dato</div>
      <div class="actions">
        <button class="btn btn-primary" id="btnCopy">Copiar DATO</button>
        <button class="btn" id="btnSaveMemory">Guardar DATO</button>
      </div>
    </div>

    <div class="panel">
      <div class="label">Prompt editable</div>
      <div id="promptPreviewImgs" class="img-grid"></div>
      <textarea class="textarea" id="promptEditor" placeholder="Escribe o elige un prompt..."></textarea>
      <div class="actions">
        <button class="btn btn-success" id="btnOpen">Abrir modelo</button>
        <button class="btn" id="btnCopyMemory">UNIR prompt + DATO</button>
      </div>
    </div>

    <div class="panel" id="pendingImages">
      <div class="panel-head">
        <div>
          <div class="label">Memoria persistente</div>
          <div class="memory-meta" id="memoryMeta">Sin memoria guardada</div>
        </div>
        <button class="btn btn-danger" id="btnClearMemory" style="width:auto;min-height:28px;padding:5px 9px;">Limpiar</button>
      </div>
      <textarea class="textarea memory-text" id="memoryText" readonly></textarea>
      <div id="pendingImgsGrid"></div>
    </div>

    <div id="statusMsg" class="status"></div>
  </div>
</div>

<div class="screen" id="screenSettings">
  <div class="settings-body">
    <div class="settings-tabs">
      <button class="settings-tab-btn active" id="tabSettingsModels">Modelos de IA</button>
      <button class="settings-tab-btn" id="tabSettingsPrompts">Prompts por modelo</button>
    </div>

    <div class="settings-panel active" id="settingsModelsPanel">
      <div class="settings-section-title">Modelos de IA</div>
      <div id="modelsList"></div>
      <button class="add-prompt-btn" id="btnAddModel">+ Agregar modelo</button>
    </div>

    <div class="settings-panel" id="settingsPromptsPanel">
      <div class="settings-section-title">Prompts por modelo</div>
      <div class="prompt-model-tabs" id="promptModelTabs"></div>
      <div id="promptsList"></div>
      <button class="add-prompt-btn" id="btnAddPrompt">+ Agregar prompt</button>
    </div>
  </div>
</div>

<div class="footer">AI PROMPT VAULT · v2.0</div>
<div class="toast" id="toast"></div>

<script src="popup.js"></script>
</body>
</html>
